name: LaTeX Lint & Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint LaTeX sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TeX Live (chktex + latexindent)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            chktex \
            texlive-latex-extra

      - name: Check line width (monograph)
        run: python3 scripts/texwrap.py --check --cols 90 monograph/*.tex

      - name: Check line width (article)
        run: python3 scripts/texwrap.py --check --cols 90 article/*.tex

      - name: Run chktex (monograph)
        uses: j2kun/chktex-action@main
        with:
          args: "-q -l .chktexrc monograph/*.tex"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run chktex (article)
        uses: j2kun/chktex-action@main
        with:
          args: "-q -l .chktexrc article/*.tex"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for banned patterns
        run: |
          echo "Checking for banned patterns..."
          ERRORS=0

          # Check for $$ display math
          if grep -rn '\$\$' --include='*.tex' monograph/ article/; then
            echo "ERROR: Double-dollar display math found. Use equation*/\\[...\\] instead."
            ERRORS=1
          fi

          # Check for \eqnarray
          if grep -rn '\\begin{eqnarray' --include='*.tex' monograph/ article/; then
            echo "ERROR: \\eqnarray found. Use align/align* instead."
            ERRORS=1
          fi

          if [ "$ERRORS" -ne 0 ]; then
            exit 1
          fi

          echo "All pattern checks passed."

  build:
    name: Build PDFs
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            texlive-full \
            latexmk \
            biber

      - name: Build monograph
        run: |
          cd monograph
          mkdir -p build
          latexmk monograph-template

      - name: Build article
        run: |
          cd article
          mkdir -p build
          latexmk article-template

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdfs
          path: |
            monograph/build/*.pdf
            article/build/*.pdf
          retention-days: 14
