name: LaTeX Lint & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint LaTeX sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install chktex
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends chktex

      # Advisory: modern typography (accents → Unicode, curly quotes, no tabs)
      # via `make fashion`. Surfaces drift as an annotation; never gates.
      - name: Check typography (advisory)
        continue-on-error: true
        run: python3 _scripts/texfashion.py --check *.tex

      # Advisory: the project uses semantic wrapping (one sentence/clause per
      # line via `make wrap`). This surfaces drift as an annotation but does NOT
      # gate the pipeline — pre-existing prose must not block collaborators.
      - name: Check semantic wrapping (advisory)
        continue-on-error: true
        run: python3 _scripts/texwrap.py --check --cols 256 *.tex

      # Advisory: chktex flags style nits (non-breaking spaces, quote style, …)
      # that never prevent compilation, so it must not gate the build.
      - name: Run chktex (advisory)
        continue-on-error: true
        uses: j2kun/chktex-action@main
        with:
          args: "-q -l .chktexrc *.tex"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Hard gate: these genuinely harm output/portability.
      - name: Check for banned patterns
        run: |
          echo "Checking for banned patterns..."
          ERRORS=0
          if grep -n '\$\$' *.tex; then
            echo "ERROR: Double-dollar display math found. Use \\[...\\] or equation* instead."
            ERRORS=1
          fi
          if grep -n '\\begin{eqnarray' *.tex; then
            echo "ERROR: \\eqnarray found. Use align/align* instead."
            ERRORS=1
          fi
          [ "$ERRORS" -eq 0 ] && echo "All pattern checks passed."
          exit $ERRORS

  build:
    name: Build PDFs
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            texlive-full \
            latexmk

      # Build every "main" .tex (one with \documentclass); chapter files
      # \include'd by a monograph are skipped. Auto-discovery keeps this working
      # after a child project deletes or renames a template file.
      - name: Build all main documents
        run: |
          shopt -s nullglob
          built=0
          for f in *.tex; do
            if grep -q '\\documentclass' "$f"; then
              echo "── Building $f ──"
              latexmk "${f%.tex}"
              built=1
            fi
          done
          if [ "$built" -eq 0 ]; then echo "No main .tex found"; exit 1; fi

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdfs
          path: "*.pdf"
          retention-days: 14
